{% import "partials/ui.html" as ui %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberWaifu Bot - 管理员登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;600;700&family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/tokens.css', v=moment().timestamp() | int) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/base.css', v=moment().timestamp() | int) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/ui.css', v=moment().timestamp() | int) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css', v=moment().timestamp() | int) }}">
</head>
<body class="login-page" data-theme="dark">
    <section class="login-shell" aria-labelledby="login-title">
        <header class="login-header">
            <div class="login-brand">
                {{ ui.icon('bot') }}
            </div>
            <h1 id="login-title" class="login-title">CyberWaifu Bot</h1>
            <p class="login-subtitle">管理员登录</p>
        </header>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ ui.icon('alert') }}
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
            <div class="form-group">
                <label for="password" class="form-label">管理员密码</label>
                <div class="search-input-wrapper">
                    <span class="password-icon">{{ ui.icon('lock') }}</span>
                    <input type="password"
                           class="form-input"
                           id="password"
                           name="password"
                           placeholder="请输入管理员密码"
                           required
                           autofocus>
                </div>
            </div>

            <button type="submit" class="btn-primary btn-login">
                {{ ui.icon('login') }}
                <span>登录</span>
            </button>
        </form>

        <p class="login-footnote">
            {{ ui.icon('shield') }}
            <span>安全登录 · 仅限管理员访问</span>
        </p>
    </section>
</body>
</html>
